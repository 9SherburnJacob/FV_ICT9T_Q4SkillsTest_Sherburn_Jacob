<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills Test LOGIN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f4f4f4; }

  #header { 
    height: 60px; 
    background: #1a1a1a; 
    color: white; 
    display: flex; 
    align-items: center; 
    padding: 0 20px; 
    flex-shrink: 0;
  }
  
  #logo {
    font-weight: bold;
    font-size: 1rem;
    color: #ffffff;
  }

  #container { 
    display: flex; 
    flex: 1; 
    justify-content: center; 
    align-items: center; 
  }

  .login-box {
    background: white;
    padding: 40px;
    border-radius: 8px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
    text-align: center;
  }

  h1 { margin-bottom: 20px; font-size: 1.8rem; }

  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1rem;
  }

  #submit { 
    width: 100%; 
    background: #1a1a1a; 
    color: white; 
    border: none; 
    padding: 12px; 
    cursor: pointer; 
    border-radius: 4px;
    font-size: 1rem;
    font-weight: bold;
  }

  #submit:hover { background: #333; }
  #submit:disabled { background: #888; cursor: not-allowed; }

  #feedback-text {
    margin-top: 15px;
    color: #d9534f;
    font-size: 0.9rem;
    min-height: 1.2rem;
  }

  #footer {
    height: 40px;
    background: #1a1a1a;
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
  }

  .imaje {
    height: 45px;
    width: 45px;
  }
</style>
</head>
<body>

  <div id="header">
    <div id="logo"><img class="imaje" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQKfHfYtZis-gpD09-XgVZkYql9R4sXoLhu4g&s"></div>
    <span style="margin-left: 15px; font-size: 1.2rem;">Virtual Notebook</span>
  </div>

  <div id="container">
    <div class="login-box">
      <h1>Login</h1>
      <input type="text" id="username_input" placeholder="Username">
      <input type="password" id="password_input" placeholder="Password">
      <button id="submit" onclick="function_name()">Sign In</button>
      <div id="feedback-text"></div>
    </div>
  </div>

  <div id="footer">
    &copy; OBMC 2026
  </div>

<script>
let attempt_counter = 0;
//automatically sets attempt counter to 0.
function function_name(){
    let username = document.getElementById("username_input").value;
    let password = document.getElementById("password_input").value;
    let grantedMsg = "Access Granted";
    let deniedMsg = "Access Denied";
    // Variables.

    do {
        if (username === "John" && password === "1039817") {
            alert('Welcome back student John!');
            attempt_counter = 0; 
            document.getElementById("feedback-text").innerHTML = "";
            window.location.href = "notebooks.html"; 
            break; 
            //Checks if the username and password are correct and then sends you to the virtual notebook.
        } else {
            attempt_counter++;
            document.getElementById("feedback-text").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
                //Detects how many failed attempts have been imputed.
        }
    } while (false); 

    if (attempt_counter >= 3) {
        alert(deniedMsg);
        document.getElementById("submit").disabled = true; 
        //If counter exceeds or equals to 3 then it locks the button.
    }
} 
</script>

</body>
</html>
