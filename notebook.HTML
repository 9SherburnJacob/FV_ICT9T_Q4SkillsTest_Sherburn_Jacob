<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f4f4f4; }

  #header { 
    height: 60px; 
    background: #1a1a1a; 
    color: white; 
    display: flex; 
    align-items: center; 
    padding: 0 20px; 
    flex-shrink: 0;
  }
  
  #logo {
    font-weight: bold;
    font-size: 1.5rem;
    color: #fff;
  }

  #container { display: flex; flex: 1; overflow: hidden; }

  #sidebar { 
    width: 200px; 
    background: #222; 
    color: white;

  }

  #sidebar h2 { padding: 20px; font-size: 1.1rem; border-bottom: 1px solid #444; }

  .side-btn { 
    width: 100%; 
    background: #333; 
    color: white; 
    border: none; 
    padding: 10px; 
    margin-bottom: 5px; 
    cursor: pointer; 
    text-align: left;
    border-radius: 4px;
  }
  .side-btn:hover { background: #555; }

  #main { flex: 1; padding: 30px; overflow-y: auto; }
  
  .subject-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); 
    gap: 20px; 
    margin-top: 20px; 
  }

  .subject-card {
    background: white;
    padding: 30px 10px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    font-weight: bold;
  }

  #footer {
    height: 40px;
    background: #1a1a1a;
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    flex-shrink: 0;
  }

  .imaje {

  }

  h1 { margin-bottom: 20px; }
</style>
